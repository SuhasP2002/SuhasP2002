<svg width="280" height="90" viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lcBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa116"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="lcFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#161311"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="276" height="86" rx="14" fill="url(#lcFill)" stroke="url(#lcBorder)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <rect x="27" y="27" width="36" height="36" rx="8" fill="none" stroke="#ffa116" stroke-width="2.5"/>
  <path d="M35 45 L45 35 M35 45 L45 55" fill="none" stroke="#ffa116" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="translate" values="0 0; -2 0; 0 0" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <text x="80" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#fdf3e3">LeetCode</text>
  <text x="80" y="61" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#d8b98a">DSA practice &amp; contests →</text>
</svg>
