<svg width="280" height="90" viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pfBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a085"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="pfFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1b1e"/>
      <stop offset="100%" stop-color="#0f1b24"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="276" height="86" rx="14" fill="url(#pfFill)" stroke="url(#pfBorder)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <circle cx="45" cy="45" r="20" fill="none" stroke="#5be7c4" stroke-width="2.5">
    <animate attributeName="r" values="18;21;18" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <path d="M35 45 L42 52 L57 37" fill="none" stroke="#5be7c4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="80" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#eafaf6">Portfolio</text>
  <text x="80" y="61" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#8fb9ad">Projects &amp; case studies →</text>
</svg>
