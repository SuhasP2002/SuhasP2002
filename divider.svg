<svg width="1000" height="28" viewBox="0 0 1000 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a085" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#2980b9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#16a085" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a085" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5be7c4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="14" x2="1000" y2="14" stroke="url(#baseGrad)" stroke-width="2"/>

  <rect x="-200" y="6" width="200" height="16" fill="url(#sweepGrad)">
    <animate attributeName="x" from="-200" to="1000" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <circle cx="500" cy="14" r="4" fill="#5be7c4">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
